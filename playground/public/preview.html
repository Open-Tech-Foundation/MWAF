<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenTF Live Preview Sandbox</title>
  <script type="importmap">
    {
      "imports": {
        "@opentf/web": "/standalone/web.js",
        "@preact/signals-core": "https://unpkg.com/@preact/signals-core@1.14.1/dist/signals-core.module.js"
      }
    }
  </script>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: sans-serif;
      background: white;
      color: black;
    }
    #app {
      padding: 20px;
    }
  </style>
</head>
<body>
  <div id="app">
    <h1>Hello World!</h1>
    <p>The OpenTF live preview is ready.</p>
  </div>

  <script type="module">
    const root = document.getElementById('app');

    window.addEventListener('message', async (event) => {
      const { type, code } = event.data;
      
      if (type === 'REPL_UPDATE' && code) {
        console.log("📥 [Sandbox] Received code update.");
        root.innerHTML = "";

        try {
          const blob = new Blob([code], { type: 'application/javascript' });
          const url = URL.createObjectURL(blob);
          
          const module = await import(url);
          const render = module.render || (module.default && module.default.render) || (typeof module.default === 'function' ? module.default : null);

          if (render) {
            if (typeof render === 'function' && !render.render) {
              render(root, { params: {} });
            } else if (render.render) {
              render.render(root, { params: {} });
            }
          } else {
            root.innerHTML = `
              <div style="color: #64748b; padding: 40px; text-align: center; border: 2px dashed #e2e8f0; border-radius: 1rem;">
                <p style="font-weight: bold;">No Export Found</p>
                <p style="font-size: 0.875rem;">Please ensure your code has an <code>export default</code> component.</p>
              </div>
            `;
          }
          URL.revokeObjectURL(url);
        } catch (err) {
          console.error("❌ [Sandbox] Runtime Error:", err);
          root.innerHTML = `
            <div class="error-container">
              <h3 class="error-title">Runtime Error</h3>
              <pre class="error-stack">${err.stack || err.message}</pre>
            </div>
          `;
        }
      }
    });

    // Notify parent that we are ready
    window.parent.postMessage({ type: 'SANDBOX_READY' }, '*');
  </script>
</body>
</html>
